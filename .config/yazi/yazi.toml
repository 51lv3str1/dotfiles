[opener]
image = [
  { run = "swayimg %s", block = false, desc = "Open image in Swayimg" },
  { run = "swayimg --gallery", block = false, desc = "Open gallery in Swayimg" },
  { run = "open %s", block = false, desc = "Open image in Preview (macOS)" }
]

edit = [
  { run = "nvim %s", block = true, desc = "Open in Neovim" },
  { run = "code %s", block = false, desc = "Open in VS Code" },
  { run = """
    FILE=%s
    DIR=$(dirname "$FILE")
    NAME=$(basename "$FILE")
    SESSION="${NAME}-$$"
    tmux new-session -d -s "$SESSION" -c "$DIR" "sleep 0.3 && nvim '$FILE'"
    tmux split-window -v -c "$DIR" -p 15
    tmux select-pane -U
    tmux split-window -h -c "$DIR" -p 15
    sleep 0.05
    tmux send-keys -t "$SESSION" 'claude' C-m
    tmux select-pane -D
    tmux split-window -h -c "$DIR" -p 15
    sleep 0.05
    tmux send-keys -t "$SESSION" 'lazygit' C-m
    tmux select-pane -L
    tmux split-window -h -c "$DIR" -p 85
    tmux select-pane -L
    sleep 0.05
    tmux send-keys -t "$SESSION" 'lazydocker' C-m
    tmux attach -t "$SESSION"
  """, block = true, desc = "Open with tmux dev layout" }
]

[open]
rules = [
  { mime = "image/*", use = "image" },
  { mime = "text/*", use = "edit" },
  { mime = "*/", use = "edit" },
  { mime = "inode/directory", use = "edit" }
]
